name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Every Node line the package supports (`engines.node >= 18`).
        node: [18, 20, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # No lockfile yet (the package has zero runtime deps); plain install.
      - run: npm install --no-audit --no-fund
      - run: npx tsc --noEmit
      - run: npx eslint .
      - run: npx vitest run
      - run: npx tsup
