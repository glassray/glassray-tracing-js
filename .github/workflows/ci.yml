name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Every Node line the package supports (`engines.node >= 18`).
        node: [18, 20, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package-lock.json
      # Reproducible install from the committed lockfile — the build toolchain is
      # pinned, so a compromised devDep release can't silently enter a CI run.
      - run: npm ci --no-audit --no-fund
      # Vulnerability gate. Runtime deps are zero by design, so this audits the
      # dev toolchain only — gate on critical to stay signal, not noise.
      - run: npm audit --audit-level=critical
      - run: npx tsc --noEmit
      - run: npx eslint .
      - run: npx vitest run
      - run: npx tsup
